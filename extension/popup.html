<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Tool Auto Approver</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>工具自动确认</h1>

      <label class="row">
        <span>
          <strong>自动点击允许</strong>
          <small>只匹配 ChatGPT 工具确认卡</small>
        </span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="row">
        <span>
          <strong>卡住时刷新</strong>
          <small>按钮缺失、重试停留或消息显示错误</small>
        </span>
        <input id="autoRefresh" type="checkbox">
      </label>

      <label class="field">
        <span>刷新等待秒数</span>
        <input id="refreshDelaySeconds" min="5" max="120" step="1" type="number">
      </label>

      <label class="field">
        <span>重试等待秒数</span>
        <input id="retryRefreshDelaySeconds" min="5" max="180" step="1" type="number">
      </label>

      <button id="scanNow" type="button">立即扫描当前页</button>
      <p id="status" role="status"></p>
    </main>
    <script src="src/core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
